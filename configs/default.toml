# webrecon configuration
# Copy this to ~/.config/webrecon/config.toml and fill in the keys you have.
# Every key is optional — modules that need a missing key will say so at runtime.
# Env vars override file values: WEBRECON_SHODAN, WEBRECON_VIRUSTOTAL, etc.

[keys]
shodan         = ""
ipinfo         = ""
pulsedive      = ""
vulners        = ""
intelx         = ""
greynoise      = ""
virustotal     = ""
otx            = ""
nvd            = ""
abuseipdb      = ""
censys         = ""   # Personal Access Token (Bearer auth, new API)
github         = ""   # Personal Access Token (classic or fine-grained); optional, raises rate limit
